---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ansible-role-gpg
    image: geerlingguy/docker-ubuntu2004-ansible:latest
    pre_build_image: true
    privileged: true
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro

provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /tmp/ansible-${USER}
      # verbosity: 3
  playbooks:
    converge: converge.yml

lint: |
  set -e
  ansible-lint

verifier:
  name: testinfra
