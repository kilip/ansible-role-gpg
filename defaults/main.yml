---
gpg_user: "root"
gpg_group: "{{ gpg_user }}"
gpg_temp_dir: "/tmp/kilip.gpg"
gpg_temp_bin: "{{ gpg_temp_dir }}/bin"

gpg_realname: ""
gpg_email: ""
gpg_comment: ""
gpg_key_type: RSA
gpg_key_length: 4096
gpg_subkey_type: "{{ gpg_key_type }}"
gpg_subkey_length: "{{ gpg_key_length }}"
gpg_expire_date: 0
gpg_key_installed: false
